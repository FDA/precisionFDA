<!DOCTYPE html>
<html lang="en">
  <head>
    <style>
      html {
        scroll-behavior: smooth;
      }

      body {
        font-family: Helvetica, sans-serif;
        padding: 0;
        margin: 0;
        height: 100vh;
      }

      .anchor {
        display: block;
        position: relative;
        top: -60px;
        visibility: hidden;
      }

      h1 {
        text-align: center;
      }

      h2 {
        margin-top: 30px;
        padding-top: 30px;
        border-top: 1px solid #343e4d;
      }

      #container {
        height: 100%;
        overflow: hidden;
        background-color: white;
        display: flex;
        flex-direction: row;
        flex-wrap: nowrap;
        justify-content: flex-start;
        align-content: stretch;
        align-items: stretch;
      }

      #sidebar {
        order: 0;
        flex: 0 0 auto;
        align-self: auto;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      #main {
        scroll-behavior: smooth;
        order: 0;
        flex: 1 1 auto;
        align-self: auto;
        background-color: #ddd;
      }
      #report {
        padding: 16px;
        background-color: white;
      }

      #sidebar,
      #main {
        padding: 10px;
        overflow: auto;
      }

      #resizer {
        cursor: ew-resize;
        background-color: #666;
        width: 10px;
        height: 100%;
        transition: background-color 0.2s;
        cursor: ew-resize;
      }
      #resizer:hover {
        background-color: #555;
      }

      .item {
        display: flex;
        flex-direction: column;
        gap: 8px;
        max-width: 100%;
        text-align: center;
        vertical-align: top;
        margin-bottom: 24px;
        color: #343e4d;
        padding: 12px;
        border-radius: 6px;
        border: 1px solid #cecece;
      }

      .item h3,
      p {
        margin: 0;
      }

      .item-list {
        justify-content: center;
        flex-wrap: wrap;
        display: flex;
        gap: 10px;
        font-size: 12px;
      }

      .canvas-wrapper {
        overflow: auto;
        padding: 4px;
        display: inline-block;
        max-width: 100%;
      }

      .title {
        margin-top: 30px;
        text-align: center;
      }

      .navbar-item .section-name {
        font-weight: bold;
      }

      .navbar-item {
        min-height: 26px;
      }

      .navbar-item a {
        text-decoration: none;
        font-size: 14px;
      }

      .navbar-item svg {
        width: 10px;
        height: 10px;
      }

      .navbar-item .subnav a {
        display: block;
        border-bottom: 1px solid white;
        padding: 7px 0 7px 0;
        white-space: nowrap;
        text-overflow: ellipsis;
        overflow: hidden;
        text-align: left;
      }

      .subnav {
        max-height: 0; /* Start with a max-height of 0 to hide content */
        overflow: hidden;
        transition: max-height 0.3s ease-in-out; /* Transition for smooth effect */
        margin-top: 8px;
        padding-left: 24px;
      }

      .navbar-item .collapse-icon {
        cursor: pointer;
        padding: 8px;
      }

      .navbar-item svg {
        transform: rotate(90deg);
      }
      .navbar-item.expanded svg {
        transform: rotate(180deg);
      }

      .navbar-item.expanded .subnav {
        max-height: fit-content;
      }

      @media print {
        #main {
          background-color: white;
          overflow: visible;
        }
        #sidebar,
        #resizer {
          display: none;
        }
        #container {
          display: block;
          overflow: visible;
        }
      }
    </style>
  </head>
  <body>
    <script>
      function ready(fn) {
        if (document.readyState !== 'loading') {
          fn()
          return
        }
        document.addEventListener('DOMContentLoaded', fn)
      }

      const resizeData = {
        tracking: false,
        startWidth: 200,
        startCursorScreenX: null,
        handleWidth: 10,
        resizeTarget: null,
        parentElement: null,
        maxWidth: null,
      }

      const debounce = (func, delay) => {
        let inDebounce
        return function () {
          const context = this
          const args = arguments
          clearTimeout(inDebounce)
          inDebounce = setTimeout(() => func.apply(context, args), delay)
        }
      }

      ready(function () {
        const resizer = document.getElementById('resizer')
        const sidebar = document.getElementById('sidebar')

        resizer.addEventListener('mousedown', function (event) {
          if (event.button === 0) {
            event.preventDefault()
            event.stopPropagation()

            if (!resizer.parentElement) {
              console.error(new Error('Parent element not found.'))
              return
            }

            resizeData.startWidth = sidebar.offsetWidth
            resizeData.startCursorScreenX = event.screenX
            resizeData.resizeTarget = sidebar
            resizeData.parentElement = resizer.parentElement
            resizeData.maxWidth = resizer.parentElement.clientWidth - resizeData.handleWidth
            resizeData.tracking = true

            console.log('tracking started')
          }
        })

        window.addEventListener(
          'mousemove',
          debounce(function (event) {
            if (resizeData.tracking) {
              const cursorScreenXDelta = event.screenX - resizeData.startCursorScreenX
              const newWidth = Math.min(
                resizeData.startWidth + cursorScreenXDelta,
                resizeData.maxWidth,
              )

              resizeData.resizeTarget.style.width = newWidth + 'px'
            }
          }, 1),
        )

        window.addEventListener('mouseup', function (event) {
          if (resizeData.tracking) {
            resizeData.tracking = false

            console.log('tracking stopped')
          }
        })

        const collapseIcons = document.querySelectorAll('.collapse-icon')

        collapseIcons.forEach(function (icon) {
          icon.addEventListener('click', function () {
            const navbarItem = icon.closest('.navbar-item')
            if (navbarItem) {
              navbarItem.classList.toggle('expanded')
            }
          })
        })
      })
    </script>
  </body>
</html>
