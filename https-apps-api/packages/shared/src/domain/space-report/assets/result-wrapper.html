<!DOCTYPE html>
<html lang="en">
  <head>
    <style>
      html {
        scroll-behavior: smooth;
        font-size: 62.5%;

        --black: #343e4d;
        --link-color: #1f70b5;
      }

      body {
        font-family: Helvetica, sans-serif;
        padding: 0;
        margin: 0;
        height: 100vh;
      }

      .anchor {
        display: block;
        position: relative;
        top: -6rem;
        visibility: hidden;
      }

      h1 {
        text-align: center;
      }

      h2 {
        margin-top: 3rem;
        padding-top: 3rem;
        border-top: 0.1rem solid var(--black);
      }

      #container {
        height: 100%;
        overflow: hidden;
        background-color: white;
        display: flex;
        flex-direction: row;
        flex-wrap: nowrap;
        justify-content: flex-start;
        align-content: stretch;
        align-items: stretch;
      }

      #sidebar {
        overflow: auto;
        order: 0;
        flex: 0 0 auto;
        align-self: auto;
        display: flex;
        flex-direction: column;
        gap: 1.6rem;
      }
      #main {
        scroll-behavior: smooth;
        order: 0;
        flex: 1 1 auto;
        align-self: auto;
        background-color: #ddd;
        padding: 1rem;
      }
      #report {
        padding: 1.6rem;
        background-color: white;
        max-width: 1200px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        align-items: stretch;
      }

      #sidebar,
      #main {
        overflow: auto;
      }

      #resizer {
        cursor: ew-resize;
        background-color: #b0b0b0;
        width: 2px;
        height: 100%;
        transition: background-color 0.2s;
        cursor: ew-resize;
      }
      .sidenav {
        padding: 1rem;
        text-wrap: nowrap;
      }
      .resizing {
        background-color: var(--link-color);
      }
      #resizer:hover {
        background-color: var(--link-color);
      }

      .logo {
        max-width: 500px;
        width: 100%;
      }

      .item {
        display: flex;
        flex-direction: column;
        gap: 0.8rem;
        max-width: 100%;
        text-align: center;
        vertical-align: top;
        margin-bottom: 2.4rem;
        color: var(--black);
        padding: 1.2rem;
        border-radius: 0.6rem;
        border: 0.1rem solid #cecece;
      }

      .item h3,
      p {
        margin: 0;
      }

      .item-list {
        justify-content: center;
        flex-wrap: wrap;
        display: flex;
        gap: 1rem;
        font-size: 1.2rem;
      }

      .canvas-wrapper {
        overflow: auto;
        padding: 0.4rem;
        display: inline-block;
        max-width: 100%;
      }

      .title {
        margin-top: 3rem;
        text-align: center;
        align-items: center;
        flex-direction: column;
        display: flex;
        align-self: center;
      }

      .navbar-item .section-name {
        font-weight: bold;
      }

      .navbar-item {
        min-height: 2.6rem;
      }

      .navbar-item a {
        text-decoration: none;
        font-size: 1.4rem;
        color: var(--link-color);
      }

      .navbar-item svg {
        width: 1rem;
        height: 1rem;
        color: #434343;
      }

      .navbar-item .subnav a {
        display: block;
        border-bottom: 0.1rem solid white;
        padding: 0.7rem 0 0.7rem 0;
        white-space: nowrap;
        text-overflow: ellipsis;
        overflow: hidden;
        text-align: left;
      }
      .navbar-item .subnav a:hover {
        color: green;
      }

      .subnav {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.3s ease-in-out;
        margin-top: 0.8rem;
        padding-left: 2.4rem;
      }

      .navbar-item .collapse-icon {
        cursor: pointer;
        padding: 0.8rem;
      }

      .navbar-item svg {
        transform: rotate(90deg);
      }
      .navbar-item.expanded svg {
        transform: rotate(180deg);
      }

      .navbar-item.expanded .subnav {
        max-height: fit-content;
      }

      @media print {
        #main {
          background-color: white;
          overflow: visible;
          padding: 0;
        }
        #sidebar,
        #resizer {
          display: none;
        }
        #container {
          display: block;
          overflow: visible;
        }
      }
    </style>
    <style>
      .node-path {
        fill: none;
        stroke: #8198bc;
      }

      .node a {
        display: inline-block;
        padding: 0.5rem;
        font-size: 1.3rem;
        white-space: nowrap;
        max-width: 100%;
        box-sizing: border-box;
        overflow: hidden;
        text-overflow: ellipsis;
        text-decoration: none;
        background-color: #eee;
        border-radius: 0.3rem;
        border: 0.1em solid #ccc;
        color: var(--link-color);
        font-family: serif;
      }

      .node svg path {
        fill: var(--link-color);
      }

      .node a:hover {
        color: #4297df;
      }

      .node a:hover svg path {
        fill: #4297df;
      }

      .node .content {
        text-align: center;
      }

      .node .content svg {
        height: 1.8rem;
        vertical-align: middle;
        padding-right: 0.5rem;
      }

      .node .content span {
        vertical-align: middle;
      }

      .canvas {
        display: inline-block;
        padding: 1.6em 1.6rem;
      }
    </style>
  </head>
  <body>
    <script>
      function ready(fn) {
        if (document.readyState !== 'loading') {
          fn()
          return
        }
        document.addEventListener('DOMContentLoaded', fn)
      }

      const resizeData = {
        tracking: false,
        startWidth: 200,
        startCursorScreenX: null,
        handleWidth: 10,
        resizeTarget: null,
        parentElement: null,
        maxWidth: null,
      }

      const debounce = (func, delay) => {
        let inDebounce
        return function () {
          const context = this
          const args = arguments
          clearTimeout(inDebounce)
          inDebounce = setTimeout(() => func.apply(context, args), delay)
        }
      }

      ready(function () {
        const resizer = document.getElementById('resizer')
        const sidebar = document.getElementById('sidebar')

        resizer.addEventListener('mousedown', function (event) {
          if (event.button === 0) {
            event.preventDefault()
            event.stopPropagation()

            if (!resizer.parentElement) {
              console.error(new Error('Parent element not found.'))
              return
            }

            resizeData.startWidth = sidebar.offsetWidth
            resizeData.startCursorScreenX = event.screenX
            resizeData.resizeTarget = sidebar
            resizeData.parentElement = resizer.parentElement
            resizeData.maxWidth = resizer.parentElement.clientWidth - resizeData.handleWidth
            resizeData.tracking = true
          }
        })

        window.addEventListener(
          'mousemove',
          debounce(function (event) {
            if (resizeData.tracking) {
              const cursorScreenXDelta = event.screenX - resizeData.startCursorScreenX
              const newWidth = Math.min(
                resizeData.startWidth + cursorScreenXDelta,
                resizeData.maxWidth,
              )

              resizeData.resizeTarget.style.width = newWidth + 'px'
              resizer.classList.add('resizing')
            }
          }, 1),
        )

        window.addEventListener('mouseup', function (event) {
          if (resizeData.tracking) {
            resizeData.tracking = false
            resizer.classList.remove('resizing')
          }
        })

        const collapseIcons = document.querySelectorAll('.collapse-icon')

        collapseIcons.forEach(function (icon) {
          icon.addEventListener('click', function () {
            const navbarItem = icon.closest('.navbar-item')
            if (navbarItem) {
              navbarItem.classList.toggle('expanded')
            }
          })
        })
      })
    </script>
  </body>
</html>
