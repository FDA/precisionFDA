---
driver:
  name: vagrant

provisioner:
  name: chef_zero
  always_update_cookbooks: true
  product_name: 'chef'
  product_version: '12.18.31'
  log_level: info
  require_chef_omnibus: '12.18.31'

verifier:
  name: inspec

platforms:
  - name: ubuntu-16.04
    driver:
      network:
        - ["forwarded_port", { guest: 443, host: 443 }]
        - ["private_network", { ip: "192.168.33.33" }]

suites:
  - name: default
    data_bags_path: "data_bags"
    run_list:
      - recipe[pfda::setup]
      - recipe[pfda::configure_nginx]
      - recipe[pfda::deploy]
    verifier:
      inspec_tests:
        - test/integration/default
    attributes:
      cpu:
        total: 1
      cloudwatch:
        aws_access_key_id: aws_access_key_id
        aws_secret_access_key: aws_access_key_id
