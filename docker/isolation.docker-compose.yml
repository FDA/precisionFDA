version: "3.2"
services:
  web:
    build:
      context: ../
      dockerfile: docker/isolation.Dockerfile
    volumes:
      - type: bind
        source: ../
        target: /precision-fda
    environment:
      - RAILS_LOG_TO_STDOUT=1
      - RAILS_ENV=ui_test
    working_dir: /precision-fda
    ports:
      - '3000:3000'
    depends_on:
      - db
  db:
    image: mysql:latest
    volumes:
      - 'pfda-mysql-volume:/var/lib/mysql'
    environment:
      - MYSQL_ROOT_PASSWORD=password
    ports:
      - 3306
volumes:
  pfda-mysql-volume:
