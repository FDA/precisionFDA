version: '3.7'

x-shared: &shared
  build:
    context: ../
    dockerfile: docker/isolation.Dockerfile
  environment:
    - RAILS_LOG_TO_STDOUT=1
    - RAILS_ENV=ui_test
    - NO_FIPS=1
    - REDIS_WORKER_URL=redis://redis:6379/0

services:
  web:
    <<: *shared
    volumes:
      - type: bind
        source: ../
        target: /precision-fda
      - type: volume
        source: pfda-gems
        target: /usr/local/bundle
      - pfda-mysql-volume:/var/lib/mysql
    working_dir: /precision-fda
    ports:
      - 3000:3000
    depends_on:
      - db
      - redis
      - sidekiq
    entrypoint: ./docker/isolation.docker-entrypoint.sh

  nodejs-api:
    build:
      context: ../
      dockerfile: ./https-apps-api/docker/node.isolated-qa.Dockerfile
      args:
        - database_url_build=mysql://root:password@db:3306/precisionfda-ui-test
    command: ['make', 'run-dist']
    ports:
      - 3001:3001
    depends_on:
      - db
      - redis

  nodejs-worker:
    build:
      context: ../
      dockerfile: ./https-apps-api/docker/node.isolated-qa.Dockerfile
      args:
        - database_url_build=mysql://root:password@db:3306/precisionfda-ui-test

    command: ['make', 'run-worker-dist']
    depends_on:
      - db
      - redis

  gsrs:
    build:
      context: ../
      dockerfile: ./docker/gsrs.Dockerfile
    ports:
      - 9000:9000
      - 4200:4200
    entrypoint: /gsrs.entrypoint.sh
    environment:
      JAVA_OPTS: '-Xms4096m -Xmx4096m -XX:ReservedCodeCacheSize=512m -Dpidfile.path=/dev/null -DapplyEvolutions.default=false'
    depends_on:
      - ginasdb

  db:
    image: mysql:5.6
    volumes:
      - pfda-mysql-volume:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=password
    ports:
      - 32800:3306

  ginasdb:
    image: mariadb
    volumes:
      - gsrs-mysql-volume:/var/lib/mysql
    tmpfs:
      - /tmp
      - /run/mysqld
    environment:
      MARIADB_ROOT_PASSWORD: password
      MARIADB_DATABASE: ixginas
    ports:
      - 32900:3306

  redis:
    image: redis:5.0
    ports:
      - 6379:6379

  sidekiq:
    <<: *shared
    volumes:
      - type: bind
        source: ../
        target: /precision-fda
      - type: volume
        source: pfda-gems
        target: /usr/local/bundle
    entrypoint: docker/sidekiq.entrypoint.sh
    depends_on:
      - redis

volumes:
  pfda-mysql-volume:
  gsrs-mysql-volume:
  pfda-gems:
