version: '3.7'

x-ruby-shared: &shared_ruby
  build:
    context: ../
    dockerfile: docker/images/isolation.Dockerfile
    args:
      - RUBY_IMAGE_TAG=${RUBY_IMAGE_TAG:-2.7.5}
  environment:
    - RAILS_ENV=${INTEL_RAILS_ENV:-ui_test}
    - RAILS_LOG_TO_STDOUT=1
    - LOG_REQUESTS=1
    - NO_FIPS=1
    - REDIS_WORKER_URL=redis://redis:6379/0
    - GSRS_URL=http://gsrs:9000
    - GSRS_ENABLED=true
    - SKIP_RUBY_DEPS_SETUP=${SKIP_RUBY_DEPS_SETUP}
    - SKIP_DB_SETUP=${SKIP_DB_SETUP}

x-nodejs-shared: &shared_nodejs
  build:
    context: ../
    dockerfile: ./https-apps-api/docker/images/node.isolated-qa.Dockerfile
    args:
      - NODEJS_IMAGE_TAG=${NODEJS_IMAGE_TAG:-12.22.10}

services:
  web:
    <<: *shared_ruby
    volumes:
      - type: bind
        source: ../
        target: /precision-fda
      - type: volume
        source: bundler-deps-cache-ruby
        target: /usr/local/bundle
      - db-pfda-mysql-volume:/var/lib/mysql
    working_dir: /precision-fda
    ports:
      - 3000:3000
    depends_on:
      - db
      - redis
      - sidekiq
      - gsrs
    entrypoint: ./docker/entrypoint/isolation.docker-entrypoint.sh

  frontend:
    build:
      context: ../client
      dockerfile: ./docker/images/isolation.Dockerfile
      args:
        - FRONTEND_IMAGE_TAG=${FRONTEND_IMAGE_TAG:-12}
    volumes:
      - type: bind
        source: ../app/assets/packs/bundle.js
        target: /precision-fda/dist/bundle.js
      - type: volume
        source: webpack-cache-client
        target: /precision-fda/.build_cache/
    command: yarn watch:docker

  gsrs:
    build:
      context: ../
      dockerfile: ./gsrs/docker/images/gsrs.Dockerfile
    environment:
      - MYSQL_HOST=gsrsdb
      - MYSQL_DATABASE=ixginas
      - MYSQL_ROOT_PASSWORD=password
      - GSRS_PORT=9000
    ports:
      - 9000:9000
    depends_on:
      - gsrsdb

  gsrsdb:
    image: mysql:${MYSQL_IMAGE_TAG:-5.6}
    volumes:
      - db-gsrs-mysql-volume:/var/lib/mysql
    tmpfs:
      - /tmp
      - /run/mysqld
    environment:
      - MYSQL_DATABASE=ixginas
      - MYSQL_ROOT_PASSWORD=password
    ports:
      - 32900:3306

  nodejs-api:
    <<: *shared_nodejs
    command: ['make', 'run-dist']
    ports:
      - 3001:3001
    depends_on:
      - db
      - redis

  nodejs-worker:
    <<: *shared_nodejs
    command: ['make', 'run-worker-dist']
    depends_on:
      - db
      - redis

  db:
    image: mysql:${MYSQL_IMAGE_TAG:-5.6}
    volumes:
      - db-pfda-mysql-volume:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=password
    ports:
      - 32800:3306

  redis:
    image: redis:5.0
    ports:
      - 6379:6379

  sidekiq:
    <<: *shared_ruby
    volumes:
      - type: bind
        source: ../
        target: /precision-fda
      - type: volume
        source: bundler-deps-cache-ruby
        target: /usr/local/bundle
    entrypoint: docker/entrypoint/sidekiq.entrypoint.sh
    depends_on:
      - redis

volumes:
  db-pfda-mysql-volume:
  db-gsrs-mysql-volume:
  bundler-deps-cache-ruby:
  webpack-cache-client:
