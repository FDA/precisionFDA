name: "Close Stale PRs & Issues"
on:
  schedule:
  - cron: "0 17 * * *"

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Close Stale PRs & Issues
    runs-on: ubuntu-latest
    steps:
    - uses: actions/stale@v9.0.0
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        stale-issue-message: 'This issue is stale because it has been open 90 days with no activity.'
        stale-pr-message: 'This PR is stale because it has been open 30 days with no activity.'
        days-before-stale: 90
        days-before-close: -1
        operations-per-run: 450