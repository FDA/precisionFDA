name: precisionFDA
on:
  push:
    branches:
      - 'master'
  pull_request:
    branches:
      - '*'

jobs:
  static-analysis-master:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
    name: Static Analysis for Master
    runs-on: ubuntu-latest
    env:
      BUNDLE_WITHOUT: "default test production"
      MAKE: "make --jobs 4"
    steps:
      - uses: actions/checkout@v2

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      # # Enable this after a global rubocop fix.
      # - name: Rubocop
      #   run: bundle exec rubocop

      - name: Brakeman
        run: bundle exec brakeman -A -w2 --parser-timeout 30

  static-analysis-pr:
    if: ${{ github.event_name == 'pull_request' }}
    name: Static Analysis for PR
    runs-on: ubuntu-latest
    env:
      BUNDLE_WITHOUT: "default test production"
      MAKE: "make --jobs 4"
    permissions:
      contents: read
      pull-requests: write
      statuses: write
    steps:
      - uses: actions/checkout@v2

      - name: Fetch Git branches
        run: git fetch --no-tags --prune origin +refs/heads/*:refs/remotes/origin/*

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Rubocop
        run: bundle exec pronto run -f github_status github_pr -c origin/${{ github.base_ref }}
        env:
          PRONTO_PULL_REQUEST_ID: ${{ github.event.pull_request.number }}
          PRONTO_GITHUB_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUNDLE_PATH: "vendor/bundle"

      - name: Brakeman
        run: bundle exec pronto run -f github_status github_pr -c origin/${{ github.base_ref }} -r brakeman
        env:
          PRONTO_PULL_REQUEST_ID: ${{ github.event.pull_request.number }}
          PRONTO_GITHUB_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUNDLE_PATH: "vendor/bundle"

  test-ruby:
    name: Test Ruby
    runs-on: ubuntu-latest
    env:
      MAKE: "make --jobs 4"

    services:
      mysql:
        image: mysql:5.7
        ports:
          - 3306:3306
        env:
          MYSQL_ROOT_PASSWORD: password

    steps:
      - uses: actions/checkout@v2

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Install & Build
        env:
          NO_FIPS: 1
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libssl-dev
          cp config/database.yml.ci config/database.yml
          bundle exec rake db:setup
          mkdir app/assets/packs
          touch app/assets/packs/bundle.js
          touch app/assets/packs/bundle.css

      - name: Test
        env:
          NO_FIPS: 1
        run: bundle exec rspec

      - name: Snyk test
        uses: snyk/actions/ruby@0.1.1
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=Gemfile.lock --org=dnanexus

      - name: Publish Snyk results
        if: always()
        uses: snyk/actions/ruby@0.1.1
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=Gemfile.lock --org=dnanexus --project-name=precision-fda
          command: monitor

  test-js:
    name: Test JS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - uses: actions/setup-node@v1
        with:
          node-version: "12.22.10"

      - name: Install
        run: yarn

      - name: Test
        run: yarn test

  test-https-apps:
    name: Test HTTPS Apps
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      DATABASE_TEST_URL: mysql://root:password@127.0.0.1:3306/test_db
      DATABASE_TEST_NAME: test_db
      MAKE: "make --jobs 4"

    services:
      mysql:
        image: mysql:5.7
        ports:
          - 3306:3306
        env:
          MYSQL_ROOT_PASSWORD: password

    steps:
      - uses: actions/checkout@v2

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - uses: actions/setup-node@v1
        with:
          node-version: '12.22.10'

      - name: Install & Build
        env:
          NO_FIPS: 1
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libssl-dev
          cp config/database.yml.ci config/database.yml
          bundle exec rake db:setup
          npm install -g yarn

      - name: Test
        run: |
          make install
          make test-worker
          make test-api
        working-directory: ./https-apps-api

      - name: Snyk test
        run: cd https-apps-api && node_modules/.bin/snyk test
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  test-react-app:
    name: Test React app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - uses: actions/setup-node@v1
        with:
          node-version: '12.22.10'

      - name: Install
        run: yarn --frozen-lockfile
        working-directory: ./client

      - name: Test
        run: yarn test
        working-directory: ./client

      - name: Lint
        run: yarn lint .
        working-directory: ./client

  test-react-app-production:
    name: Test React app production build
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production
    steps:
      - uses: actions/checkout@v2

      - uses: actions/setup-node@v2
        with:
          node-version: '12.22.10'

      - name: Install
        run: yarn --frozen-lockfile
        working-directory: ./client

      - name: Build production
        run: npm rebuild node-sass && yarn run build:production
        working-directory: ./client
