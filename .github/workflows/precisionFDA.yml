name: precisionFDA
on:
  push:
    branches:
      - 'master'
  pull_request:
    branches:
      - '*'

jobs:
  # Prepopulates ruby cache
  # This is because of behaviour of github actions
  # When two parallel jobs attempt to write same set of deps into cache
  # It causes following error
  # Unable to reserve cache with key setup-ruby-bundler-cache-v3-ubuntu-20.04-ruby-2.7.5-Gemfile.lock-e82dcaca5ba83e867a2506d159bec55cc14ba20a0d7df00850b22a1f25d364ba, another job may be creating this cache.
  # Example run: https://github.com/dnanexus/precision-fda/runs/5841042836?check_suite_focus=true
  # Every job that uses ruby dependencies should wait for this job first
  # needs: [ruby-setup]
  ruby-setup:
    name: Setup Ruby
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          cache-version: 1

  static-analysis-master:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
    name: Static Analysis for Master
    runs-on: ubuntu-latest
    env:
      MAKE: "make --jobs 4"
    needs: [ruby-setup]
    steps:
      - uses: actions/checkout@v2

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          cache-version: 1

      # # Enable this after a global rubocop fix.
      # - name: Rubocop
      #   run: bundle exec rubocop

      - name: Brakeman
        run: bundle exec brakeman -A -w2 --parser-timeout 30

  static-analysis-pr:
    if: ${{ github.event_name == 'pull_request' }}
    name: Static Analysis for PR
    runs-on: ubuntu-latest
    env:
      MAKE: "make --jobs 4"
    permissions:
      contents: read
      pull-requests: write
      statuses: write
    needs: [ruby-setup]
    steps:
      - uses: actions/checkout@v2

      - name: Fetch Git branches
        run: git fetch --no-tags --prune origin +refs/heads/*:refs/remotes/origin/*

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          cache-version: 1

      - name: Rubocop
        run: bundle exec pronto run -f github_status github_pr -c origin/${{ github.base_ref }}
        env:
          PRONTO_PULL_REQUEST_ID: ${{ github.event.pull_request.number }}
          PRONTO_GITHUB_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUNDLE_PATH: "vendor/bundle"

      - name: Brakeman
        run: bundle exec pronto run -f github_status github_pr -c origin/${{ github.base_ref }} -r brakeman
        env:
          PRONTO_PULL_REQUEST_ID: ${{ github.event.pull_request.number }}
          PRONTO_GITHUB_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUNDLE_PATH: "vendor/bundle"

  test-ruby:
    name: Test Ruby
    runs-on: ubuntu-latest
    env:
      MAKE: "make --jobs 4"

    services:
      mysql:
        image: mysql:5.7
        ports:
          - 3306:3306
        env:
          MYSQL_ROOT_PASSWORD: password
    needs: [ruby-setup]
    steps:
      - uses: actions/checkout@v2
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          cache-version: 1

      - name: Install & Build
        env:
          NO_FIPS: 1
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libssl-dev nodejs
          npm install -g bower
          bower install --allow-root
          cp config/database.ci.yml config/database.yml
          bundle exec rake db:setup
          touch app/assets/packs/bundle.js
          touch app/assets/packs/bundle.css

      - name: Test
        env:
          NO_FIPS: 1
          RAILS_LOG_TO_STDOUT: 1
          LOG_REQUESTS: 1
        run: bundle exec rspec

  test-js:
    name: Test JS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - uses: actions/setup-node@v3
        with:
          node-version: "20.9.0"
          cache: 'yarn'
          cache-dependency-path: ./client/yarn.lock

      - name: Install
        run: yarn

      - name: Test
        run: yarn test

  test-https-apps:
    name: Test HTTPS Apps
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      DATABASE_TEST_URL: mysql://root:password@127.0.0.1:3306/test_db
      DATABASE_TEST_NAME: test_db
      MAKE: "make --jobs 4"

    services:
      mysql:
        image: mysql:5.7
        ports:
          - 3306:3306
        env:
          MYSQL_ROOT_PASSWORD: password
    needs: [ruby-setup]
    steps:
      - uses: actions/checkout@v2
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          cache-version: 1
      - uses: pnpm/action-setup@v2
        with:
          version: 8
      - uses: actions/setup-node@v3
        with:
          node-version: '20.9.0'
      # TODO(samuel) - yarn cache from setup-node@3 github actions still is quite slow and results in install time of 1 minute
      # My guess: issue might be related to the use of workspaces
      # Workaround: node_modules directly stored in the package
      # Removal requires more investingation
      - uses: actions/cache@v3
        with:
          path: |
            ./server/node_modules
          key: ${{ runner.os }}-modules-${{ hashFiles('./server/pnpm-lock.yaml') }}

      - name: Prepare env & db
        env:
          NO_FIPS: 1
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libssl-dev
          cp config/database.ci.yml config/database.yml
          bundle exec rake db:setup
          bundle exec rake db:generate_mock_data
          bundle exec rake user:generate_test_users
      - name: Install Deps
        run: make install
        working-directory: ./server
      - name: Test
        run: |
          make test-shared
          make test-worker
          make test-api
        working-directory: ./server

      - name: Test production build
        run: pnpm run build
        working-directory: ./server

  test-react-app:
    name: Test React app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - uses: pnpm/action-setup@v2
        with:
          version: 8
          node-version: '20.9.0'

      - uses: actions/cache@v3
        name: Setup pnpm cache
        with:
          path: ./client/node_modules
          key: ${{ runner.os }}-fe-modules-${{ hashFiles('./client/pnpm-lock.yaml') }}

      - name: Install dependencies
        working-directory: ./client
        run: pnpm install --prod=false

      - name: Test
        working-directory: ./client
        run: pnpm test

  test-react-app-production:
    name: Test React app production build
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production
    steps:
      - uses: actions/checkout@v2
      
      - uses: pnpm/action-setup@v2
        with:
          version: 8

      - uses: actions/cache@v3
        name: Setup pnpm cache
        with:
          path: ./client/node_modules
          key: ${{ runner.os }}-fe-modules-${{ hashFiles('./client/pnpm-lock.yaml') }}

      - name: Install dependencies
        working-directory: ./client
        run: pnpm install --prod=false

      - name: Build production
        working-directory: ./client
        run: pnpm run build:production
