# Project Docs: https://confluence.internal.dnanexus.com/pages/viewpage.action?pageId=20124178

name: Master Workflow
on:
  push:
    branches:
      - master

jobs:
  build:
    name: Full Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Set up Ruby
        uses: actions/setup-ruby@v1
        with:
          ruby-version: 2.6.x

      - name: Build
        run: |
          gem install bundler
          bundle install --jobs 4 --retry 3

      - name: Lint
        run: rubocop

      - name: Brakeman
        run: brakeman -A --parser-timeout 30 -o gha_out/brakeman.html -w2

      - name: Rails Best Practices
        run: rails_best_practices

      - name: Unit Tests
        run: bundle exec rake

  checkDependencies:
    name: Dependencies Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Run Snyk
        uses: snyk/actions/ruby@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=Gemfile.lock --org=dnanexus

      - name: Publish
        if: always()
        uses: snyk/actions/ruby@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=Gemfile.lock --org=dnanexus --project-name=precision-fda
          command: monitor
