# Project Docs: https://confluence.internal.dnanexus.com/pages/viewpage.action?pageId=20124178

name: Pull-Request Workflow
on: pull_request

jobs:
  staticAnalysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Fetch Git branches
        run: git fetch

      - name: Lint
        uses: HeRoMo/pronto-action@v0.5.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          runner: rubocop
          commit: origin/${{ github.base_ref }}

      - name: Brakeman
        uses: HeRoMo/pronto-action@v0.5.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          runner: brakeman
          commit: origin/${{ github.base_ref }}

  test-ruby:
    name: Test (Ruby)
    runs-on: ubuntu-latest
    container: ruby:2.7.1

    services:
      mysql:
        image: mysql:5.7
        env:
          MYSQL_ROOT_PASSWORD: password

    steps:
      - uses: actions/checkout@v2

      - name: Install & Build
        run: |
          apt-get update
          apt-get install -y cmake libssl-dev
          gem install bundler -v 2.1.4
          bundle install --jobs 4 --retry 3

      - name: Configure
        env:
          NO_FIPS: 1
        run: |
          cp config/database.yml.ci config/database.yml
          bundle exec rake db:setup

      - name: Create fake bundles
        run: |
          mkdir app/assets/packs
          touch app/assets/packs/bundle.js
          touch app/assets/packs/bundle.css

      - name: Unit Tests
        env:
          NO_FIPS: 1
        run: bundle exec rspec

  test-js:
    name: Test (JS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - uses: actions/setup-node@v1
        with:
          node-version: "12.16.1"

      - name: Install
        run: yarn

      - name: Test
        run: yarn test

  test-nodejs-api:
    name: Test HTTPS Apps api
    runs-on: ubuntu-latest
    container: ruby:2.7.1

    services:
      mysql:
        image: mysql:5.7
        env:
          MYSQL_ROOT_PASSWORD: password

    env:
      NODE_ENV: test
      DATABASE_TEST_URL: mysql://root:password@mysql:3306/test_db
      DATABASE_TEST_NAME: test_db

    steps:
      - uses: actions/checkout@v2
      # we have to get the database to same state as for RoR app
      - name: Install & Build
        run: |
          apt-get update
          apt-get install -y cmake libssl-dev
          gem install bundler -v 2.1.4
          bundle install --jobs 4 --retry 3
      - uses: actions/setup-node@v1
        with:
          node-version: '12.16.1'
      - name: Configure
        env:
          NO_FIPS: 1
        run: |
          cp config/database.yml.ci config/database.yml
          bundle exec rake db:setup
      - name: Install yarn
        run: npm install -g yarn
      - run: cd ./https-apps-api && make install
      - run: cd ./https-apps-api && make test-api
      - run: cd ./https-apps-api && make test-worker

  react-app:
    name: React App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - uses: actions/setup-node@v1
        with:
          node-version: "12.16.1"

      - name: Install
        run: yarn --frozen-lockfile
        working-directory: ./client

      - name: Test
        run: yarn test
        working-directory: ./client

      - name: Lint
        run: yarn lint .
        working-directory: ./client
