name: "Deploy ECS Service"
description: "Builds, pushes or retrieves an image, and deploys ECS service"

inputs:
  environment:
    required: true
    description: "Environment name (e.g., dev, test, staging)"
  region:
    required: true
    description: "AWS region"
  role-arn:
    required: true
    description: "AWS role ARN for ECS deployment"
  orchestration-account-id:
    required: true
    description: "AWS Account ID for ECR repo"
  package:
    required: true
    description: "Package name (docs, web (client + rails), server, nginx)"
  dockerfile:
    required: false
    description: "Optional path to Dockerfile (overrides default)"
  context:
    required: false
    default: .
    description: "Optional Docker build context (defaults to '.')"

outputs:
  image-tag:
    description: "The Docker image tag that was built or retrieved from ECR."
    value: ${{ steps.set_output.outputs.image-tag }}

runs:
  using: "composite"
  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install boto3
      shell: bash

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-region: ${{ inputs.region }}
        role-to-assume: ${{ inputs.role-arn }}

    - name: Get AWS Account ID
      id: get_account_id
      run: |
        ACCOUNT_ID=$(aws sts get-caller-identity --query "Account" --output text)
        echo "ACCOUNT_ID=$ACCOUNT_ID" >> $GITHUB_ENV
      shell: bash

    - name: Calculate short SHA, branch, and repo for image tag
      id: calc_tag
      run: |
        BRANCH_NAME=${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}

        # Compute short SHA
        if [ "${{ inputs.package }}" == "web" ]; then
          SHA_CLIENT=$(git rev-parse HEAD:packages/client)
          SHA_RAILS=$(git rev-parse HEAD:packages/rails)
          SHORT_SHA=$(echo "${SHA_CLIENT}_${SHA_RAILS}" | sha1sum | cut -c1-7)
        else
          SHORT_SHA=$(git rev-parse --short HEAD:packages/${{ inputs.package }})
        fi

        # Determine ECR repository name
        if [[ "$BRANCH_NAME" == "master" ]]; then
          REPO_NAME="pfda/prod/${{ inputs.package }}"
        else
          REPO_NAME="pfda/${{ inputs.package }}"
        fi

        # Export values for other steps
        echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
        echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV
        echo "REPO_NAME=$REPO_NAME" >> $GITHUB_ENV
      shell: bash

    - name: Log in to Amazon ECR
      uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076
      with:
        registries: ${{ inputs.orchestration-account-id }}

    - name: Check if image exists in ECR
      id: check_ecr
      run: |
        # Check ECR for exact SHA match only
        EXISTING_IMAGE=$(aws ecr list-images \
          --registry-id "${{ inputs.orchestration-account-id }}" \
          --repository-name "${{ env.REPO_NAME }}" \
          --filter "tagStatus=TAGGED" \
          --query "sort_by(imageIds[?contains(imageTag, \`${{ steps.calc_tag.outputs.short_sha }}\`)], &imageTag)[-1].imageTag" \
          --output text 2>/dev/null || echo "")

        EXISTING_IMAGE="${EXISTING_IMAGE:-}"

        if [ -z "$EXISTING_IMAGE" ] || [ "$EXISTING_IMAGE" = "None" ]; then
          echo "Image does not exist, need to build."
          TIMESTAMP=$(date +%Y%m%dT%H%M)
          IMAGE_TAG="${{ env.BRANCH_NAME }}-${{ steps.calc_tag.outputs.short_sha }}-${TIMESTAMP}"
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          echo "build_needed=true" >> $GITHUB_OUTPUT
        else
          echo "Image already exists: $EXISTING_IMAGE"
          echo "IMAGE_TAG=$EXISTING_IMAGE" >> $GITHUB_ENV
          echo "build_needed=false" >> $GITHUB_OUTPUT
        fi
      shell: bash

    - name: Skip build if image exists
      if: steps.check_ecr.outputs.build_needed == 'false'
      run: echo "Docker image already exists in ECR. Skipping build."
      shell: bash

    - name: Set Docker build paths
      if: steps.check_ecr.outputs.build_needed == 'true'
      run: |
        # Use input if provided, otherwise default to standard package path
        if [ -n "${{ inputs.dockerfile }}" ]; then
          echo "DOCKERFILE=${{ inputs.dockerfile }}" >> $GITHUB_ENV
        else
          echo "DOCKERFILE=packages/${{ inputs.package }}/docker/images/Dockerfile" >> $GITHUB_ENV
        fi
      shell: bash

    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349

    - name: Build and push Docker image
      if: steps.check_ecr.outputs.build_needed == 'true'
      uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75
      with:
        push: true
        tags: ${{ inputs.orchestration-account-id }}.dkr.ecr.${{ inputs.region }}.amazonaws.com/${{ env.REPO_NAME }}:${{ env.IMAGE_TAG }}
        file:  ${{ env.DOCKERFILE }}
        context: ${{ inputs.context }}
        build-args: |
          GIT_BRANCH=${{ github.ref_name }}
          GIT_REVISION=${{ github.sha }}
        cache-from: |
          type=gha,scope=gems,key=${{ runner.os }}-gems-${{ hashFiles('packages/rails/Gemfile.lock') }}
          type=gha,scope=pnpm,key=${{ runner.os }}-pnpm-${{ hashFiles('packages/client/pnpm-lock.yaml') }}
        cache-to: |
          type=gha,mode=max,scope=gems,key=${{ runner.os }}-gems-${{ hashFiles('packages/rails/Gemfile.lock') }}
          type=gha,mode=max,scope=pnpm,key=${{ runner.os }}-pnpm-${{ hashFiles('packages/client/pnpm-lock.yaml') }}

    - name: Set action output
      id: set_output
      run: echo "image-tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
      shell: bash
