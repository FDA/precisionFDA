default: &default
  adapter: mysql2
  pool: <%= ENV["DB_POOL"] || 20 %>
  timeout: 5000
  host: db
  username: root
  password: password
  collation: utf8_unicode_ci
  variables:
    sql_mode: TRADITIONAL

dev:
  <<: *default
  database: precisionfda-dev

development:
  <<: *default
  database: precision-fda

test:
  <<: *default
  database: precisionfda-test

ui_test:
  <<: *default
  database: precisionfda-ui-test

staging:
  <<: *default
  database: precisionfda-production

production:
  <<: *default
  database: precisionfda-production
