user nginx;
worker_processes auto;
pid /var/run/nginx.pid;
error_log /dev/stderr warn;


events {
  worker_connections 1024;
  use epoll;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Define the Cache Path
  proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=gsrs_cache:10m max_size=1g inactive=60m use_temp_path=off;

  # === MAPS FOR LOGIC ===
  # Map 1: Determine if we should skip the cache based on the query param
  map $arg_simpleSearchOnly $skip_cache {
    "true"  0; # Do NOT skip (Cache this)
    default 1; # Skip (Do NOT cache)
  }

  # Map 2: Strip Authorization header if we are in "Cache Mode" (skip_cache=0)
  # If skip_cache is 0 (caching), we send an empty string to the backend
  map $skip_cache $proxy_auth_header {
    0       "";
    1       $http_authorization;
  }

  # Map 3: Strip Cookie header if we are in "Cache Mode"
  map $skip_cache $proxy_cookie_header {
    0       "";
    1       $http_cookie;
  }

  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 1000;
  gzip_types
    text/plain
    text/css
    application/json
    application/javascript
    text/xml
    application/xml
    application/xml+rss
    text/javascript
    image/svg+xml;

  server_tokens off;
  client_max_body_size 50M;
  keepalive_requests 100000;
  keepalive_timeout 120;
  send_timeout 120;

  real_ip_header X-Forwarded-For;
  set_real_ip_from 10.0.0.0/8;
  real_ip_recursive on;

  log_format custom_format '$remote_addr - $remote_user [$time_local] '
    '"$request" $status $body_bytes_sent '
    'AUTH_EMAIL="$http_authentication_email" '
    'AUTH_NAME="$http_authentication_username" '
    'XFF_HEADER="$http_x_forwarded_for" '
    'USER_AGENT="$http_user_agent"';

  access_log /dev/stdout custom_format;


  server {
    listen 80;

    # Needed to pass authentication headers
    underscores_in_headers on;

    # === ROUTING FIXES ===
    # We replaced 'localhost' with 'gsrs' (the docker service name)

    location /health {
      access_log off;
      return 200 "OK\n";
    }

    # Replacement for ROOT routing module
    location /ginas/app/ui {
      proxy_pass http://gsrs-web:8080/frontend/ginas/app/ui;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /ginas/app/beta {
      proxy_pass http://gsrs-web:8080/frontend/ginas/app/ui;
      proxy_set_header Host $host;
    }

    # === CACHED SUBSTANCE SEARCHES ===
    location ~ ^/ginas/app/(.+substances/search.*)$ {
      rewrite ^/ginas/app/(.*) /substances/$1 break;

      # Cache Control
      proxy_cache            gsrs_cache;
      proxy_cache_bypass     $skip_cache;
      proxy_no_cache         $skip_cache;
      proxy_cache_valid      200 60m;
      proxy_cache_valid      404 1m;
      proxy_cache_key        "$scheme$request_method$host$request_uri";

      # Safety: Overwrite headers with our Map variables
      # If caching is on, these become empty, ensuring no session leakage
      proxy_set_header Authorization $proxy_auth_header;
      proxy_set_header Cookie        $proxy_cookie_header;

      # Ignore backend headers to ensure the 60m cache is respected
      proxy_ignore_headers   Cache-Control Expires Set-Cookie;
      proxy_hide_header      Set-Cookie;

      # Serve stale cache if backend is down or slow
      proxy_cache_use_stale  error timeout updating http_500 http_502 http_503 http_504;
      proxy_cache_background_update on;
      proxy_cache_lock on;

      proxy_pass http://gsrs-web:8080;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /ginas/app/ {
      proxy_pass http://gsrs-web:8080/substances/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }
}