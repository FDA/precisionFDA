user nginx;
worker_processes auto;
pid /var/run/nginx.pid;
error_log /dev/stderr warn;


events {
  worker_connections 1024;
  use epoll;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 1000;
  gzip_types
    text/plain
    text/css
    application/json
    application/javascript
    text/xml
    application/xml
    application/xml+rss
    text/javascript
    image/svg+xml;

  server_tokens off;
  client_max_body_size 50M;
  keepalive_requests 100000;
  keepalive_timeout 120;
  send_timeout 120;

  real_ip_header X-Forwarded-For;
  set_real_ip_from 10.0.0.0/8;
  real_ip_recursive on;

  log_format custom_format '$remote_addr - $remote_user [$time_local] '
    '"$request" $status $body_bytes_sent '
    'AUTH_EMAIL="$http_authentication_email" '
    'AUTH_NAME="$http_authentication_username" '
    'XFF_HEADER="$http_x_forwarded_for" '
    'USER_AGENT="$http_user_agent"';

  access_log /dev/stdout custom_format;


  server {
    listen 80;

    # Needed to pass authentication headers
    underscores_in_headers on;

    # === ROUTING FIXES ===
    # We replaced 'localhost' with 'gsrs' (the docker service name)

    location /health {
      access_log off;
      return 200 "OK\n";
    }

    # Replacement for ROOT routing module
    location /ginas/app/ui {
      proxy_pass http://gsrs-web:8080/frontend/ginas/app/ui;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /ginas/app/beta {
      proxy_pass http://gsrs-web:8080/frontend/ginas/app/ui;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /ginas/app/ {
      proxy_pass http://gsrs-web:8080/substances/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }
}