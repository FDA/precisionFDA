components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    StringArray:
      type: array
      items:
        type: string
    IntegerArray:
      type: array
      items:
        type: integer
    Timestamp:
      type: integer
      minimum: 1230768000000
    Float:
      type: number
      format: float
    MappingOrArray:
      oneOf:
        - type: object
        - type: array
    BooleanOrMapping:
      oneOf:
        - type: boolean
        - type: object
    OrgLevel:
      type: string
      enum: ["ADMIN", "MEMBER"]
    ProjectAccess:
      type: string
      enum: ["VIEW", "UPLOAD", "CONTRIBUTE", "ADMINISTER", "NONE"]
    ProjectPermission:
      type: string
      enum: ["VIEW", "UPLOAD", "CONTRIBUTE", "ADMINISTER"]
    AppState:
      type: string
      enum: ["open", "closed"]
    UserDxidString:
      type: string
      pattern: "^user-[a-zA-Z0-9._]"
      example: "user-harry.potter"
    OrgDxidString:
      type: string
      pattern: "^org-pfda..[a-zA-Z0-9._]"
      example: "org-pfda..harry.potter"
    OrgDxidHandle:
      type: string
      pattern: "^pfda..[a-zA-Z0-9._]"
      example: "pfda..harry.potter"
    ProjectDxidString:
      type: string
      pattern: "^project-[0123456789BFGJKPQVXYZbfgjkpqvxyz]{24}"
    FileDxidString:
      type: string
      pattern: "^file-[0123456789BFGJKPQVXYZbfgjkpqvxyz]{24}"
    AppletDxidString:
      type: string
      pattern: "^applet-[0123456789BFGJKPQVXYZbfgjkpqvxyz]{24}"
    AppDxidString:
      type: string
      pattern: "^app-[0123456789BFGJKPQVXYZbfgjkpqvxyz]{24}"
    JobDxidString:
      type: string
      pattern: "^job-[0123456789BFGJKPQVXYZbfgjkpqvxyz]{24}"
    WorkflowDxidString:
      type: string
      pattern: "^workflow-[0123456789BFGJKPQVXYZbfgjkpqvxyz]{24}"
    DbClusterDxidString:
      type: string
      pattern: "^dbcluster-[0123456789BFGJKPQVXYZbfgjkpqvxyz]{24}"
    ContainerDxidString:
      type: string
      pattern: "^container-[0123456789BFGJKPQVXYZbfgjkpqvxyz]{24}"
    StageDxidString:
      type: string
      pattern: "^stage-[0123456789BFGJKPQVXYZbfgjkpqvxyz]{24}"
    ObjectDxidString:
      oneOf:
        - $ref: "#/components/schemas/ProjectDxidString"
        - $ref: "#/components/schemas/FileDxidString"
        - $ref: "#/components/schemas/AppletDxidString"
        - $ref: "#/components/schemas/AppDxidString"
        - $ref: "#/components/schemas/JobDxidString"
        - $ref: "#/components/schemas/WorkflowDxidString"
        - $ref: "#/components/schemas/DbClusterDxidString"
    CreatedBy:
      oneOf:
        - type: object
          properties:
            user:
              $ref: "#/components/schemas/UserDxidString"
        - type: object
          properties:
            job:
              $ref: "#/components/schemas/JobDxidString"
        - type: object
          properties:
            executable:
              $ref: "#/components/schemas/AppDxidString"
    ObjectIdResponse:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/ObjectDxidString"
    OrgIdResponse:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/OrgDxidString"
    ObjectDescribeFields:
