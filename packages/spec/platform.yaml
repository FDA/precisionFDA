openapi: 3.0.2
info:
  title: precisionFDA Usage of Platform API
  description: |-
    precisionFDA Usage of Platform API
  version: 1.0.0
servers:
  - url: https://stagingapi.dnanexus.com
    description: Staging platform API server
  - url: https://api.dnanexus.com
    description: Production platform API server
tags:
  - name: org
    description: Org
  - name: user
    description: User Operations
  - name: project
    description: Project Operations
  - name: class
    description: Class Operations
  - name: system
    description: System operations
  - name: file
    description: File Operations
  - name: applet
    description: Applet Operations
  - name: app
    description: App Operations
  - name: job
    description: Job Operations
  - name: workflow
    description: Workflow Operations
  - name: dbcluster
paths:
  /org/new:
    post:
      tags:
        - org
      summary: Create users orgs, spaces orgs
      description: |
        - https://documentation.dnanexus.com/developer/api/organizations#api-method-org-new
        - Create org from name and handle, org's handle pattern: "pfda.."
      operationId: orgNew
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PFDAOrgNew"
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgIdResponse"
  /{orgDxid}/invite:
    post:
      tags:
        - org
      summary: Invite user to a space org, called from Admin Token
      description: |
        - https://documentation.dnanexus.com/developer/api/organizations#api-method-org-xxxx-invite
      operationId: orgInvite
      parameters:
        - $ref: "#/components/parameters/orgDxidParam"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PFDAOrgInvite"
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/OrgIdResponse"
                  - type: object
                    properties:
                      state:
                        type: string
  /{orgDxid}/describe:
    post:
      tags:
        - org
      summary: Org Describe
      description: |
        - https://documentation.dnanexus.com/developer/api/organizations#api-method-org-xxxx-describe
        - Used to describe cloud costs `computeCharges, storageCharges, dataEgressCharges`
      operationId: orgDescribe
      parameters:
        - $ref: "#/components/parameters/orgDxidParam"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                defaultFields:
                  description: default false if fields is supplied, true otherwise
                  type: boolean
                fields:
                  type: object
                  additionalProperties:
                    type: boolean
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgDescribeResponse"
  /{orgDxid}/removeMember:
    post:
      tags:
        - org
      summary: Remove member out of the org
      description: |
        - https://documentation.dnanexus.com/developer/api/organizations#api-method-org-xxxx-removemember
      operationId: orgRemoveMember
      parameters:
        - $ref: "#/components/parameters/orgDxidParam"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  $ref: "#/components/schemas/UserDxidString"
                revokeProjectPermissions:
                  type: boolean
                  default: true
                revokeAppPermissions:
                  type: boolean
                  default: true
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    $ref: "#/components/schemas/OrgDxidString"
                  projects:
                    type: object
                    additionalProperties:
                      type: boolean
                  apps:
                    type: object
                    additionalProperties:
                      type: boolean
  /{orgDxid}/findMembers:
    post:
      tags:
        - org
      summary: Find org members
      description: |
        - https://documentation.dnanexus.com/developer/api/organizations#api-method-org-xxxx-findmembers
      operationId: orgFindMembers
      parameters:
        - name: orgDxid
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/OrgDxidString"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PFDAOrgFindMembers"
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: "#/components/schemas/OrgMember"
                  next:
                    type: object
  /{userDxid}/describe:
    post:
      tags:
        - user
      summary: Describe user
      description: |
        - https://documentation.dnanexus.com/developer/api/users#api-method-user-xxxx-describe
        - Basically, other users (admin users) can only see the basic information (id, name, etc), other fields are present when requesting user as same as the user
      operationId: userDescribe
      parameters:
        - $ref: "#/components/parameters/userDxidParam"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ObjectDescribeFields"
            example:
              fields:
                email: true
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDescribeResponse"
  /{userDxid}/update:
    post:
      tags:
        - user
      summary: Update user (Unused in Node and Ruby)
      description: |
        - https://documentation.dnanexus.com/developer/api/users#api-method-user-xxxx-update
      operationId: userUpdate
      parameters:
        - $ref: "#/components/parameters/userDxidParam"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                first:
                  type: string
                last:
                  type: string
                middle:
                  type: string
                policies:
                  type: object
                  properties:
                    emailWhenJobComplete:
                      type: string
                      enum: ["never", "failuresOnly", "always"]
                sshPublicKey:
                  type: string
                billTo:
                  $ref: "#/components/schemas/OrgDxidString"
                defaultRegion:
                  type: string
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    $ref: "#/components/schemas/UserDxidString"
  /project/new:
    post:
      tags:
        - project
      summary: Create new project
      description: |
        - https://documentation.dnanexus.com/developer/api/data-containers/projects#api-method-project-new
      operationId: projectNew
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PFDAProjectNew"
            example:
              name: "project-name"
              billTo: "org-pfda..harry.potter"
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    $ref: "#/components/schemas/ProjectDxidString"
  /{projectDxid}/describe:
    post:
      tags:
        - project
      summary: Project Describe
      description: |
        - https://documentation.dnanexus.com/developer/api/data-containers/projects#api-method-project-xxxx-describe
      operationId: projectDescribe
      parameters:
        - $ref: "#/components/parameters/projectDxidParam"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                fields:
                  type: object
                  additionalProperties:
                    type: boolean
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectDescribeResponse"
  /{projectDxid}/invite:
    post:
      tags:
        - project
      summary: Project Invite
      description: |
        - https://documentation.dnanexus.com/developer/api/data-containers/project-permissions-and-sharing#api-method-project-xxxx-invite
      operationId: projectInvite
      parameters:
        - $ref: "#/components/parameters/projectDxidParam"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                fields:
                  type: object
                  properties:
                    invitee:
                      type: string
                    level:
                      type: string
                      enum: ["VIEW", "UPLOAD", "CONTRIBUTE", "ADMINISTER"]
                    suppressEmailNotification:
                      type: boolean
                      default: true
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectIdResponse"
  /{projectDxid}/update:
    post:
      tags:
        - project
      summary: Project Update
      description: |
        - https://documentation.dnanexus.com/developer/api/data-containers/projects#api-method-project-xxxx-update
        - Used for updating project's billTo
      operationId: projectUpdate
      parameters:
        - $ref: "#/components/parameters/projectDxidParam"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectNew"
            example:
              billTo: "org-pfda..harry.potter"
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectIdResponse"
  /{projectDxid}/decreasePermissions:
    post:
      tags:
        - project
      summary: Project decrease permissions
      description: |
        - https://documentation.dnanexus.com/developer/api/data-containers/project-permissions-and-sharing#api-method-project-xxxx-decreasepermissions
      operationId: projectDecreasePermissions
      parameters:
        - $ref: "#/components/parameters/projectDxidParam"
      requestBody:
        content:
          application/json:
            example:
              "user-harry.potter": "VIEW"
            schema:
              additionalProperties:
                $ref: "#/components/schemas/ProjectPermission"
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectIdResponse"
  /{projectDxid}/leave:
    post:
      tags:
        - project
      summary: Project leave
      description: Project leave
      operationId: projectLeave
      parameters:
        - $ref: "#/components/parameters/projectDxidParam"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: |
                - pFDA only allows users to leave projects, not orgs
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectIdResponse"
  /{projectDxid}/transfer:
    post:
      tags:
        - project
      summary: Project transfer
      description: |
        - https://documentation.dnanexus.com/developer/api/data-containers/project-permissions-and-sharing#api-method-project-xxxx-transfer
      operationId: projectTransfer
      parameters:
        - $ref: "#/components/parameters/projectDxidParam"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                invitee:
                  type: string
                suppressEmailNotification:
                  type: boolean
                  default: true
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectIdResponse"
  /{projectDxid}/acceptTransfer:
    post:
      tags:
        - project
      summary: Project accept transfer
      description: |
        - https://documentation.dnanexus.com/developer/api/data-containers/project-permissions-and-sharing#api-method-project-xxxx-accepttransfer
      operationId: projectAcceptTransfer
      parameters:
        - $ref: "#/components/parameters/projectDxidParam"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                billTo:
                  $ref: "#/components/schemas/OrgDxidString"
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectIdResponse"
  /{projectDxid}/destroy:
    post:
      tags:
        - project
      summary: Project destroy
      description: |
        - https://documentation.dnanexus.com/developer/api/data-containers/projects#api-method-project-xxxx-destroy
      operationId: projectDestroy
      parameters:
        - $ref: "#/components/parameters/projectDxidParam"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                terminateJobs:
                  type: boolean
                  default: false
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectIdResponse"
  /{objectDxid}/clone:
    post:
      tags:
        - class
      summary: Project destroy
      description: |
        - https://documentation.dnanexus.com/developer/api/data-containers/cloning#api-method-class-xxxx-clone
      operationId: classClone
      parameters:
        - $ref: "#/components/parameters/objectDxidParam"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PFDAObjectClone"
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ObjectCloneResponse"
  /{objectDxid}/move:
    post:
      tags:
        - class
      summary: Class move
      description: |
        - https://documentation.dnanexus.com/developer/api/data-containers/folders-and-deletion#api-method-class-xxxx-move
      operationId: classMove
      parameters:
        - $ref: "#/components/parameters/objectDxidParam"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                objects:
                  $ref: "#/components/schemas/StringArray"
                folders:
                  $ref: "#/components/schemas/StringArray"
                destination:
                  type: string
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ObjectIdResponse"
  /{objectDxid}/removeObjects:
    post:
      tags:
        - class
      summary: Class remove objects
      description: |
        - https://documentation.dnanexus.com/developer/api/data-containers/folders-and-deletion#api-method-class-xxxx-removeobjects
      operationId: classRemoveObjects
      parameters:
        - $ref: "#/components/parameters/objectDxidParam"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                objects:
                  type: array
                  items:
                    $ref: "#/components/schemas/ObjectDxidString"
                force:
                  type: boolean
                  default: false
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ObjectIdResponse"
  /system/findDataObjects:
    post:
      tags:
        - system
      summary: System find data objects
      description: |
        - https://documentation.dnanexus.com/developer/api/search#api-method-system-finddataobjects
      operationId: systemFindDataObjects
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/PFDAFindFile"
                - $ref: "#/components/schemas/PFDAFindWorkflow"
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/PFDAFindFileResponse"
                  - $ref: "#/components/schemas/ObjectFindResponse"
  /system/findOrgs:
    post:
      tags:
        - system
      summary: System find orgs
      description: |
        - https://documentation.dnanexus.com/developer/api/search#api-method-system-findorgs
      operationId: systemFindOrgs
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FindOrgs"
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ObjectFindResponse"
  /system/findJobs:
    post:
      tags:
        - system
      summary: System find jobs
      description: |
        - https://documentation.dnanexus.com/developer/api/search#api-method-system-findjobs
      operationId: systemFindJobs
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PFDAFindJobs"
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ObjectFindResponse"
  /system/findApps:
    post:
      tags:
        - system
      summary: System find apps
      description: |
        - https://documentation.dnanexus.com/developer/api/search#api-method-system-findapps
      operationId: systemFindApps
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PFDAFindApps"
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ObjectFindResponse"
  /system/findProjects:
    post:
      tags:
        - system
      summary: System find projects
      description: |
        - https://documentation.dnanexus.com/developer/api/search#api-method-system-findprojects
      operationId: systemFindProjects
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                id:
                  type: array
                  items:
                    $ref: "#/components/schemas/ProjectDxidString"
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ObjectFindResponse"
  /system/describeDataObjects:
    post:
      tags:
        - system
      summary: System describe data objects
      description: |
        - https://documentation.dnanexus.com/developer/api/system-methods#api-method-system-describedataobjects
      operationId: systemDescribeDataObjects
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PFDADescribeDataObjects"
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeDataObjectsResponse"
  /file/new:
    post:
      tags:
        - file
      summary: File New
      description: |
        - https://documentation.dnanexus.com/developer/api/introduction-to-data-object-classes/files#api-method-file-new
      operationId: fileNew
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PFDAFileNew"
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileIdResponse"
  /{fileDxid}/upload:
    post:
      tags:
        - file
      summary: File Upload
      description: |
        - https://documentation.dnanexus.com/developer/api/introduction-to-data-object-classes/files#api-method-file-xxxx-upload
      operationId: fileUpload
      parameters:
        - $ref: "#/components/parameters/fileDxidParam"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FileUpload"
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                  headers:
                    type: object
                  expires:
                    $ref: "#/components/schemas/Timestamp"
  /{fileDxid}/describe:
    post:
      tags:
        - file
      summary: File Desribe
      description: |
        - https://documentation.dnanexus.com/developer/api/introduction-to-data-object-classes/files#api-method-file-xxxx-describe
      operationId: fileDescribe
      parameters:
        - $ref: "#/components/parameters/fileDxidParam"
      requestBody:
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  properties:
                    projectDxid:
                      $ref: "#/components/schemas/ProjectDxidString"
                - $ref: "#/components/schemas/ObjectDescribeFields"
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileDescribeResponse"
  /{fileDxid}/close:
    post:
      tags:
        - file
      summary: File Close
      description: |
        - https://documentation.dnanexus.com/developer/api/introduction-to-data-object-classes/files#api-method-file-xxxx-close
      operationId: fileClose
      parameters:
        - $ref: "#/components/parameters/fileDxidParam"
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    $ref: "#/components/schemas/FileDxidString"
                  detail:
                    type: string
  /{fileDxid}/download:
    post:
      tags:
        - file
      summary: File Download
      description: |
        - https://documentation.dnanexus.com/developer/api/introduction-to-data-object-classes/files#api-method-file-xxxx-download
      operationId: fileDownload
      parameters:
        - $ref: "#/components/parameters/fileDxidParam"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PFDAFileDownload"
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                  headers:
                    type: object
                    additionalProperties:
                      type: string
  /applet/new:
    post:
      tags:
        - applet
      summary: Applet New
      description: |
        - https://documentation.dnanexus.com/developer/api/running-analyses/applets-and-entry-points#api-method-applet-new
      operationId: appletNew
      requestBody:
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/PFDAApletNew"
                - $ref: "#/components/schemas/AppletNew"
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppletIdResponse"
  /{appletDxid}/describe:
    post:
      tags:
        - applet
      summary: Applet Describe
      description: |
        - https://documentation.dnanexus.com/developer/api/running-analyses/applets-and-entry-points#api-method-applet-xxxx-describe
      operationId: appletDescribe
      parameters:
        - $ref: "#/components/parameters/appletDxidParam"
      requestBody:
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  properties:
                    project:
                      $ref: "#/components/schemas/ProjectDxidString"
                - $ref: "#/components/schemas/ObjectDescribeFields"
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppletDescribeResponse"
  /app/new:
    post:
      tags:
        - app
      summary: App New
      description: |
        - https://documentation.dnanexus.com/developer/api/running-analyses/apps#api-method-app-new
      operationId: appNew
      requestBody:
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/PFDAAppNew"
                - $ref: "#/components/schemas/AppNew"
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppIdResponse"
  /{appDxid}/run:
    post:
      tags:
        - app
      summary: App Run
      description: |
        - https://documentation.dnanexus.com/developer/api/running-analyses/apps#api-method-app-xxxx-yyyy-run
      operationId: appRun
      parameters:
        - $ref: "#/components/parameters/appDxidParam"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PFDAAppRun"
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppIdResponse"
  /{appDxid}/addAuthorizedUsers:
    post:
      tags:
        - app
      summary: App Add Authorized Users
      description: |
        - https://documentation.dnanexus.com/developer/api/running-analyses/apps#api-method-app-xxxx-yyyy-addauthorizedusers
      operationId: appAddAuthorizedUsers
      parameters:
        - $ref: "#/components/parameters/appDxidParam"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                authorizedUsers:
                  type: array
                  items:
                    oneOf:
                      - $ref: "#/components/schemas/UserDxidString"
                      - $ref: "#/components/schemas/OrgDxidString"
      responses:
        "200":
