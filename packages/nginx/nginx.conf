user www-data;
worker_processes auto;
pid /var/run/nginx.pid;
error_log /dev/stderr warn;
error_log /var/log/nginx/nginx_error.log warn;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    gzip on;
    gzip_comp_level 4;
    gzip_types text/plain text/html text/css application/xml application/json application/javascript image/svg+xml image/bmp font/eot font/otf font/ttf;
    gzip_proxied no-cache no-store private expired auth;

    server_tokens off;
    client_max_body_size 50M;
    keepalive_requests 100000;
    keepalive_timeout 120;
    send_timeout 120;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    map $uri $apicall {
        default $binary_remote_addr;
        ~list_app_revisions "";
        ~get_app_spec "";
        ~activity_reports "";
        ~get_upload_url "";
        ~create_file "";
        ~close_file "";
        ~participants "";
    }

    limit_req_zone $apicall zone=pfdazone:10m rate=5r/s;

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;
        return 301 https://$host$request_uri;
    }

    include /etc/nginx/conf.d/json_analytics_log_format_for_prometheus.conf;

    server {
        server_name precision.fda.gov;
        access_log /dev/stdout json_analytics;
        access_log /var/log/nginx/precision.fda.gov-ssl.access.log json_analytics;

        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;

        ssl_certificate /etc/nginx/ssl/pfda.crt;
        ssl_certificate_key /etc/nginx/ssl/pfda.key;

        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_session_tickets off;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_stapling on;
        ssl_stapling_verify on;
        # ssl_trusted_certificate /path/to/root_CA_cert_plus_intermediat    es;
        resolver 169.254.169.253 valid=60s;


       location /health {
            access_log off;
            return 200 "OK\n";

       }

        # Reverse proxy to UNII site on CloudFront
        location /uniisearch {
            proxy_pass https://${UNII_HOST}$uri$is_args$args;
            proxy_set_header Host ${UNII_HOST};
        }

        root /srv/pfda/public;
        try_files $uri/index.html $uri @pfda;

        location @pfda {
            #limit_req zone=pfdazone burst=20 nodelay;
            proxy_pass http://pfda;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Host $http_host;
            proxy_http_version 1.1;
            proxy_redirect off;
            proxy_buffering off;
            proxy_connect_timeout 120;
            proxy_read_timeout 120;
            proxy_send_timeout 120;
        }

        location /ws {
            proxy_pass https://pfda-nodejs-api:3001/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /docs {
            proxy_pass http://pfda-docs:4040;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

        }

        # Redirect deprecated singular /job/ path to plural /jobs/
        location ~ ^/api/v2/cli/job/([^/]+)/scope$ {
            return 301 /api/v2/cli/jobs/$1/scope;
        }

        location /api/v2/ {
            proxy_pass https://pfda-nodejs-api:3001/;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/docs/ {
            proxy_pass https://pfda-nodejs-api:3001/api/docs/;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        error_page 500 502 503 504 /500.html;

        client_max_body_size 4G;
        client_body_timeout 5s;
        client_header_timeout 5s;

        add_header X-Request-ID $request_id;
    }

    upstream pfda {
        server pfda-web:3000 fail_timeout=0;
    }
}
